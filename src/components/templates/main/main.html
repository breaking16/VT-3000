<!doctype html>
<html lang="[[lang]]">

<include src="@components/layout/head/head.html"></include>

<body data-module="dynamic">
  <div class="wrapper">

    <!-- HEADER -->
    <slot name="header"></slot>

    <!-- PAGE -->
    <main class="page">
      <slot name="main"></slot>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <slot name="footer"></slot>
    </footer>

  </div>



  <!-- DEV TOGGLE (GLOBAL) -->
  <div class="dev-toggle" data-dev-only>
    <button class="dev-toggle__btn" type="button" aria-label="DEV menu" onclick="location.href='/dev-root.html'">
      ⚙ DEV
    </button>
  </div>

  <!-- SVG SPRITE -->
  <include src="@components/layout/svg-sprite/sprite.html"></include>

  <script type="module" src="/js/app.js"></script>
</body>

</html
