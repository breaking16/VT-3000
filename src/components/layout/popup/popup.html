<!-- trigger -->
<button class="btn" type="button" data-popup-open="popup-example">
  Open popup
</button>

<!-- popup -->
<div class="popup" id="popup-example" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="popup__overlay" data-popup-close></div>

  <div class="popup__content" role="document">
    <button class="popup__close" type="button" aria-label="Close popup" data-popup-close>
      ×
    </button>

    <!-- ⬇️ ТУТ ТИ ПИШЕШ СВІЙ КОНТЕНТ -->
    <h2>Popup title</h2>
    <p>Popup works 🎉</p>
  </div>
</div>
