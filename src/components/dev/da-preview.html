<section class="dev-da">
  <h2>Dynamic Adapt playground</h2>
  <p style="opacity:.8">Зменшуй вікно <b>&lt;= 768px</b> — блоки переїдуть у TARGET.</p>

  <div class="dev-da__grid">
    <!-- EXAMPLE 1 -->
    <div class="dev-da__card">
      <div class="dev-da__head">
        <code>data-da=".dev-da__t1, 768, first"</code>
      </div>

      <div class="dev-da__row">
        <div class="dev-da__src">
          <div class="dev-da__box" data-da=".dev-da__t1, 768, first">
            BOX #1 (move to T1)
          </div>
        </div>

        <div class="dev-da__dst dev-da__t1">
          TARGET T1
        </div>
      </div>
    </div>

    <!-- EXAMPLE 2 -->
    <div class="dev-da__card">
      <div class="dev-da__head">
        <code>data-da=".dev-da__t2, 768, last"</code>
      </div>

      <div class="dev-da__row">
        <div class="dev-da__src">
          <div class="dev-da__box dev-da__box--2" data-da=".dev-da__t2, 768, last">
            BOX #2 (move to T2)
          </div>
        </div>

        <div class="dev-da__dst dev-da__t2">
          TARGET T2
        </div>
      </div>
    </div>

    <!-- EXAMPLE 3 (index place) -->
    <div class="dev-da__card">
      <div class="dev-da__head">
        <code>data-da=".dev-da__t3, 768, 1"</code>
      </div>

      <div class="dev-da__row">
        <div class="dev-da__src">
          <div class="dev-da__box dev-da__box--3" data-da=".dev-da__t3, 768, 1">
            BOX #3 (move to T3 at index 1)
          </div>
        </div>

        <div class="dev-da__dst dev-da__t3">
          <div class="dev-da__slot">slot 0</div>
          <div class="dev-da__slot">slot 1</div>
          <div class="dev-da__slot">slot 2</div>
        </div>
      </div>
    </div>
  </div>
</section>

<style>

    margin-top: 32px;

  .dev-da__grid {

  }

  .dev-da__box--2 {

  }

  .dev-da__box--3 {

  .dev-da__slot {
